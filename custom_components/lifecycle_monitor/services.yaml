reset_battery:
  name: Reset battery
  description: Resets a virtual battery sensor to 100% by setting the last replaced date to now.
  target:
    entity:
      integration: lifecycle_monitor
      domain: sensor
      device_class: battery

mark_as_done:
  name: Mark as done
  description: Marks a maintenance task as done by setting the last performed date to now.
  target:
    entity:
      integration: lifecycle_monitor
      domain: sensor
